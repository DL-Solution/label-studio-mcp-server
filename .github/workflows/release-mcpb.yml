name: Build and publish MCPB bundle

# Builds the .mcpb (MCP Bundle) and attaches it to the GitHub Release whenever a
# version tag is pushed (e.g. v0.1.0). Can also be triggered manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Validate manifest
        run: mcpb validate manifest.json

      - name: Pack bundle
        run: mcpb pack . "dist/label-studio-mcp.mcpb"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: label-studio-mcp-mcpb
          path: dist/label-studio-mcp.mcpb

      - name: Attach bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/label-studio-mcp.mcpb
